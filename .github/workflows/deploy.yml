name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy backend to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/consultiq
            git pull origin main
            cd backend
            npm ci --omit=dev
            npm run build
            npm run migration:run
            pm2 restart consultiq-api || pm2 start dist/main.js --name consultiq-api
            pm2 save
